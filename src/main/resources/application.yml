spring:
  application:
    name: wallet

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/wallet_db}
    username: ${DB_USERNAME:wallet_user}
    password: ${DB_PASSWORD:wallet_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@wallet.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080
  servlet:
    context-path: /api/v1

application:
  jwt:
    secret: ${JWT_SECRET:changeme-this-is-a-very-long-secret-key-for-local-dev-only-replace-in-prod}
    access-expiration: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  wallet:
    max-daily-limit: ${WALLET_MAX_DAILY_LIMIT:50000}
  currency:
    supported: USD,KHR
    wallet-currencies: USD,KHR
    api-url: https://v6.exchangerate-api.com
    api-key: ${EXCHANGE_RATE_API_KEY:}
    refresh-interval-ms: 3600000

logging:
  pattern:
    console: "${CONSOLE_LOG_PATTERN:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %cyan(%msg%n)}"
